<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Circle Schulte Prototype</title>
  <script>
    document.documentElement.classList.toggle("embed", new URLSearchParams(window.location.search).has("embed"));
  </script>
  <style>
    :root {
      color-scheme: light;
      --bg-top: #f4f0df;
      --bg-bottom: #dfeadf;
      --paper: #fbf4e6;
      --paper-soft: #f7eddc;
      --grid: #c6c6c6;
      --grid-strong: #a8a8a8;
      --text: #12181b;
      --muted: #647269;
      --accent: #0f8577;
      --accent-soft: #dceee6;
      --danger: #df4e44;
      --danger-soft: #fbe0da;
      --control: #fff8ec;
      --shadow: rgba(85, 104, 88, 0.22);
      --screen-size: min(466px, calc(100vw - 88px));
      --case-size: calc(var(--screen-size) + 58px);
      --ring-dark: 13px;
      --ring-outer: 29px;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      background:
        linear-gradient(145deg, var(--bg-top) 0%, #eef1e1 48%, var(--bg-bottom) 100%);
      color: var(--text);
    }

    .shell {
      width: min(100vw, 620px);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      padding: 20px;
      position: relative;
      overflow: hidden;
    }

    .shell::before,
    .shell::after {
      content: "";
      position: absolute;
      width: 170px;
      height: 260px;
      border: 1px solid rgba(139, 168, 149, 0.34);
      border-left: 0;
      border-bottom: 0;
      border-radius: 0 100% 0 0;
      transform: rotate(26deg);
      pointer-events: none;
    }

    .shell::before {
      right: -42px;
      top: 46px;
    }

    .shell::after {
      left: -58px;
      bottom: 42px;
      transform: rotate(206deg);
      opacity: 0.56;
    }

    .watch-case {
      position: relative;
      width: var(--case-size);
      height: var(--case-size);
      display: grid;
      place-items: center;
      border-radius: 50%;
      filter: drop-shadow(0 34px 62px rgba(85, 104, 88, 0.20));
      z-index: 2;
    }

    .case-button {
      position: absolute;
      z-index: 1;
      border-radius: 999px;
      box-shadow:
        inset 0 2px 4px rgba(255, 255, 255, 0.30),
        inset 0 -2px 5px rgba(24, 18, 18, 0.22),
        0 10px 18px rgba(85, 104, 88, 0.18);
    }

    .case-button--yellow {
      left: 4.5%;
      top: 6.8%;
      width: 24%;
      height: 8.5%;
      background: linear-gradient(145deg, #e2b650, #bf8931);
      transform: rotate(-42deg);
    }

    .case-button--blue {
      right: 5.2%;
      top: 7.2%;
      width: 21%;
      height: 8%;
      background: linear-gradient(145deg, #527fd6, #2e5ead);
      transform: rotate(40deg);
    }

    .case-button--red {
      left: 7.8%;
      bottom: 15%;
      width: 16%;
      height: 6.5%;
      background: linear-gradient(145deg, #d36d63, #a94c46);
      transform: rotate(43deg);
    }

    .device {
      position: relative;
      z-index: 2;
      width: var(--screen-size);
      height: var(--screen-size);
      border-radius: 50%;
      overflow: hidden;
      background:
        linear-gradient(140deg, rgba(251, 244, 230, 0.88), rgba(238, 229, 210, 0.92));
      box-shadow:
        0 0 0 var(--ring-dark) #060505,
        0 0 0 var(--ring-outer) #2b2525,
        0 0 0 calc(var(--ring-outer) + 2px) rgba(255, 255, 255, 0.16),
        0 22px 36px rgba(85, 104, 88, 0.18),
        inset 0 0 42px rgba(0, 0, 0, 0.10),
        inset 0 0 0 1px rgba(255, 249, 236, 0.62);
    }

    .device::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background:
        radial-gradient(circle at 50% 50%, transparent 58%, rgba(126, 112, 92, 0.14) 100%),
        linear-gradient(135deg, rgba(255, 255, 255, 0.14), transparent 30%, rgba(126, 112, 92, 0.10));
      pointer-events: none;
      z-index: 8;
    }

    .board {
      position: absolute;
      inset: 0;
      border-radius: 50%;
    }

    .schulte-svg {
      width: 100%;
      height: 100%;
      display: block;
      filter: drop-shadow(0 18px 26px rgba(91, 109, 89, 0.16));
    }

    .board-backdrop {
      fill: rgba(248, 239, 221, 0.86);
      stroke: rgba(168, 168, 168, 0.58);
      stroke-width: 1.5;
    }

    .density-hint {
      position: absolute;
      z-index: 6;
      inset: 0;
      display: none;
      place-items: center;
      text-align: center;
      border-radius: 50%;
      border: 0;
      background: rgba(251, 241, 226, 0.78);
      box-shadow:
        inset 0 0 0 1px rgba(168, 168, 168, 0.28),
        inset 0 22px 70px rgba(255, 248, 235, 0.34),
        inset 0 -30px 90px rgba(126, 112, 92, 0.10);
      backdrop-filter: blur(1.5px) saturate(0.96);
      color: #6a4632;
      letter-spacing: 0;
      font-variant-numeric: tabular-nums;
      pointer-events: none;
    }

    .density-hint.show {
      display: grid;
    }

    .density-hint-inner {
      display: grid;
      justify-items: center;
      align-items: center;
      gap: 4px;
      line-height: 1;
    }

    .density-level {
      color: rgba(106, 70, 50, 0.62);
      font-size: min(27px, calc((100vw - 28px) * 0.06));
      font-weight: 760;
    }

    .density-value {
      color: #6a4632;
      font-size: min(96px, calc((100vw - 28px) * 0.21));
      font-weight: 820;
    }

    .sector-cell {
      cursor: pointer;
    }

    .sector-shape {
      fill: rgba(251, 244, 230, 0.90);
      stroke: var(--grid);
      stroke-width: 2;
      vector-effect: non-scaling-stroke;
      transition: fill 120ms ease, stroke 120ms ease, filter 120ms ease, opacity 120ms ease;
    }

    .sector-number {
      dominant-baseline: middle;
      text-anchor: middle;
      font-weight: 780;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0;
      paint-order: stroke;
      stroke: rgba(251, 244, 230, 0.82);
      stroke-width: 3px;
      stroke-linejoin: round;
      pointer-events: none;
      transition: fill 120ms ease, opacity 120ms ease, transform 120ms ease;
    }

    .sector-cell.hit .sector-shape {
      fill: #d2eadf;
      stroke: #0f8577;
    }

    .sector-cell.miss .sector-shape {
      fill: var(--danger-soft);
      stroke: var(--danger);
    }

    .sector-cell.miss .sector-number {
      fill: var(--danger);
    }

    .result {
      position: absolute;
      z-index: 7;
      inset: 0;
      display: none;
      place-items: center;
      text-align: center;
      border-radius: 50%;
      border: 0;
      background: rgba(251, 241, 226, 0.78);
      box-shadow:
        inset 0 0 0 1px rgba(168, 168, 168, 0.28),
        inset 0 22px 70px rgba(255, 248, 235, 0.34),
        inset 0 -30px 90px rgba(126, 112, 92, 0.10);
      backdrop-filter: blur(1.5px) saturate(0.96);
      pointer-events: none;
    }

    .result.show {
      display: grid;
    }

    .result h1 {
      margin: 0;
      font-size: min(96px, calc((100vw - 28px) * 0.21));
      line-height: 1;
      font-weight: 820;
      letter-spacing: 0;
      color: #6a4632;
      font-variant-numeric: tabular-nums;
    }

    .external-panel {
      display: grid;
      justify-items: center;
      gap: 10px;
      z-index: 2;
    }

    .app-card {
      width: min(320px, calc(100vw - 28px));
      display: grid;
      grid-template-columns: 54px minmax(0, 1fr);
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      border: 1px solid rgba(168, 168, 168, 0.32);
      border-radius: 14px;
      background: rgba(255, 248, 236, 0.82);
      box-shadow: 0 14px 28px rgba(97, 116, 92, 0.16), inset 0 1px rgba(255, 255, 255, 0.54);
    }

    .app-icon {
      width: 54px;
      height: 54px;
      display: block;
      border-radius: 14px;
      object-fit: cover;
      box-shadow: 0 10px 20px rgba(97, 116, 92, 0.16);
    }

    .app-copy {
      min-width: 0;
      display: grid;
      gap: 3px;
    }

    .app-name {
      color: #6a4632;
      font-size: 17px;
      font-weight: 820;
      line-height: 1.15;
    }

    .app-meta {
      color: rgba(106, 70, 50, 0.62);
      font-size: 12px;
      font-weight: 680;
      line-height: 1.25;
      font-variant-numeric: tabular-nums;
    }

    .legend {
      width: min(320px, calc(100vw - 28px));
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      line-height: 17px;
    }

    .controls {
      display: flex;
      gap: 24px;
      justify-content: space-between;
    }

    .key {
      width: 112px;
      height: 46px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(135, 160, 146, 0.58);
      border-radius: 23px;
      background: var(--control);
      color: #17201b;
      font-size: 14px;
      font-weight: 740;
      letter-spacing: 0;
      box-shadow: 0 12px 22px rgba(97, 116, 92, 0.17);
      cursor: pointer;
    }

    .key:active {
      transform: translateY(1px);
      border-color: var(--accent);
      color: var(--accent);
    }

    @media (max-width: 500px) {
      .shell {
        padding: 10px;
        gap: 12px;
      }

      .controls {
        gap: 18px;
      }

      .key {
        width: 96px;
        height: 42px;
        font-size: 13px;
      }

    }

    html.embed,
    html.embed body {
      width: 466px;
      height: 466px;
      min-height: 466px;
      overflow: hidden;
      background: transparent;
    }

    html.embed body {
      display: block;
    }

    html.embed .shell {
      width: 466px;
      height: 466px;
      min-height: 466px;
      display: block;
      padding: 0;
      overflow: hidden;
    }

    html.embed .shell::before,
    html.embed .shell::after,
    html.embed .case-button,
    html.embed .external-panel {
      display: none;
    }

    html.embed .watch-case {
      width: 466px;
      height: 466px;
      filter: none;
    }

    html.embed .device {
      width: 466px;
      height: 466px;
      box-shadow: none;
    }

    html.embed .device::after {
      display: none;
    }
  </style>
</head>
<body>
  <main class="shell">
    <div class="watch-case" aria-label="StopWatch device frame">
      <span class="case-button case-button--yellow" aria-hidden="true"></span>
      <span class="case-button case-button--blue" aria-hidden="true"></span>
      <span class="case-button case-button--red" aria-hidden="true"></span>
      <section class="device" aria-label="圆形舒尔特方格原型">
        <div class="board" id="board"></div>
        <div class="density-hint" id="densityHint" aria-hidden="true"></div>
        <div class="result" id="result" aria-live="polite">
          <div>
            <h1 id="resultTitle"></h1>
          </div>
        </div>
      </section>
    </div>

    <div class="external-panel">
      <section class="app-card" aria-label="Schulte app identity">
        <img class="app-icon" src="assets/icon_schulte.png" alt="Schulte app icon">
        <div class="app-copy">
          <div class="app-name">Schulte</div>
          <div class="app-meta" id="appMeta">LV 25</div>
        </div>
      </section>
      <div class="legend" id="legend">A / ← 开始或清空　D / → 切换格数</div>
      <div class="controls">
        <button class="key" id="leftKey" type="button">左键 开始</button>
        <button class="key" id="rightKey" type="button">右键 切换</button>
      </div>
    </div>
  </main>

  <script>
    const board = document.getElementById("board");
    const densityHint = document.getElementById("densityHint");
    const result = document.getElementById("result");
    const resultTitle = document.getElementById("resultTitle");
    const appMeta = document.getElementById("appMeta");
    const leftKey = document.getElementById("leftKey");
    const rightKey = document.getElementById("rightKey");

    const svgNS = "http://www.w3.org/2000/svg";
    const center = 233;
    const outerRadius = 233;
    const radiusScale = outerRadius / 215;
    const densityCycle = [25, 18, 30];
    const scaledRadius = (radius) => radius * radiusScale;
    const ringLayouts = {
      18: [
        { inner: 0, outer: scaledRadius(80), count: 4, phase: -135 },
        { inner: scaledRadius(80), outer: scaledRadius(150), count: 6, phase: -120 },
        { inner: scaledRadius(150), outer: outerRadius, count: 8, phase: -112.5 },
      ],
      25: [
        { inner: 0, outer: scaledRadius(80), count: 6, phase: -120 },
        { inner: scaledRadius(80), outer: scaledRadius(150), count: 8, phase: -112.5 },
        { inner: scaledRadius(150), outer: outerRadius, count: 11, phase: -106.36 },
      ],
      30: [
        { inner: 0, outer: scaledRadius(80), count: 6, phase: -120 },
        { inner: scaledRadius(80), outer: scaledRadius(150), count: 10, phase: -108 },
        { inner: scaledRadius(150), outer: outerRadius, count: 14, phase: -102.857142 },
      ],
    };

    const numberColorBases = [
      "#d64036",
      "#1f64b5",
      "#00856f",
      "#9b4d16",
      "#5c4bb2",
      "#14191b",
      "#b07800",
    ];

    let densityIndex = 0;
    let state = "idle";
    let currentDensity = densityCycle[densityIndex];
    let cells = [];
    let gameColors = [];
    let ringPhaseOffsets = [];
    let target = 1;
    let startTime = 0;
    let stopTime = 0;
    let activeFlash = null;
    let audioContext = null;

    function formatTime(ms) {
      return `${(Math.max(0, ms) / 1000).toFixed(2).padStart(5, "0")}s`;
    }

    function nowMs() {
      return performance.now();
    }

    function shuffle(values) {
      const copy = values.slice();
      for (let i = copy.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function randomItem(values) {
      return values[Math.floor(Math.random() * values.length)];
    }

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function hexToRgb(hex) {
      const value = hex.replace("#", "");
      return {
        r: parseInt(value.slice(0, 2), 16),
        g: parseInt(value.slice(2, 4), 16),
        b: parseInt(value.slice(4, 6), 16),
      };
    }

    function rgbToHex({ r, g, b }) {
      return `#${[r, g, b].map((channel) => channel.toString(16).padStart(2, "0")).join("")}`;
    }

    function jitterChannel(channel, amount) {
      return clamp(channel + randomInt(-amount, amount), 0, 220);
    }

    function randomInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function createColorVariant(baseColor) {
      const rgb = hexToRgb(baseColor);
      const jitter = baseColor === "#14191b" ? 14 : 24;
      return rgbToHex({
        r: jitterChannel(rgb.r, jitter),
        g: jitterChannel(rgb.g, jitter),
        b: jitterChannel(rgb.b, jitter),
      });
    }

    function pickColorBase(excludedColors) {
      const choices = numberColorBases.filter((color) => !excludedColors.includes(color));
      return randomItem(choices.length > 0 ? choices : numberColorBases);
    }

    function createGameColors(density) {
      const colors = [];
      for (const ring of ringLayouts[density]) {
        const ringColorBases = [];
        for (let i = 0; i < ring.count; i += 1) {
          const excludedColors = [];
          if (i > 0) {
            excludedColors.push(ringColorBases[i - 1]);
          }
          if (i === ring.count - 1 && ringColorBases[0]) {
            excludedColors.push(ringColorBases[0]);
          }
          const colorBase = pickColorBase(excludedColors);
          ringColorBases.push(colorBase);
          colors.push(createColorVariant(colorBase));
        }
      }
      return colors;
    }

    function createRingPhaseOffsets(density) {
      return ringLayouts[density].map((ring) => Math.random() * (360 / ring.count));
    }

    function polarToPoint(radius, degrees) {
      const radians = (degrees * Math.PI) / 180;
      return {
        x: center + Math.cos(radians) * radius,
        y: center + Math.sin(radians) * radius,
      };
    }

    function normalizeDegrees(degrees) {
      let normalized = degrees % 360;
      if (normalized < 0) {
        normalized += 360;
      }
      return normalized;
    }

    function sectorCentroidRadius(inner, outer, stepDegrees) {
      const theta = (stepDegrees * Math.PI) / 180;
      if (theta <= 0 || outer <= 0) {
        return (inner + outer) * 0.5;
      }

      const angularFactor = Math.sin(theta * 0.5) / (theta * 0.5);
      if (inner <= 0) {
        return ((2 * outer) / 3) * angularFactor;
      }

      const denominator = outer * outer - inner * inner;
      if (denominator <= 0) {
        return (inner + outer) * 0.5;
      }

      return (2 / 3) * ((outer * outer * outer - inner * inner * inner) / denominator) * angularFactor;
    }

    function sectorPath(innerRadius, radius, startDeg, endDeg) {
      const largeArc = endDeg - startDeg > 180 ? 1 : 0;
      const outerStart = polarToPoint(radius, startDeg);
      const outerEnd = polarToPoint(radius, endDeg);

      if (innerRadius <= 0) {
        return [
          `M ${outerStart.x.toFixed(3)} ${outerStart.y.toFixed(3)}`,
          `A ${radius} ${radius} 0 ${largeArc} 1 ${outerEnd.x.toFixed(3)} ${outerEnd.y.toFixed(3)}`,
          `L ${center} ${center}`,
          "Z",
        ].join(" ");
      }

      const innerEnd = polarToPoint(innerRadius, endDeg);
      const innerStart = polarToPoint(innerRadius, startDeg);
      return [
        `M ${outerStart.x.toFixed(3)} ${outerStart.y.toFixed(3)}`,
        `A ${radius} ${radius} 0 ${largeArc} 1 ${outerEnd.x.toFixed(3)} ${outerEnd.y.toFixed(3)}`,
        `L ${innerEnd.x.toFixed(3)} ${innerEnd.y.toFixed(3)}`,
        `A ${innerRadius} ${innerRadius} 0 ${largeArc} 0 ${innerStart.x.toFixed(3)} ${innerStart.y.toFixed(3)}`,
        "Z",
      ].join(" ");
    }

    function numberFontSize(density, ringIndex) {
      if (density === 30) {
        return ringIndex === 0 ? 20 : 22;
      }
      if (density === 25) {
        return ringIndex === 0 ? 25 : 26;
      }
      return ringIndex === 0 ? 24 : 25;
    }

    function numberPosition(ring, startDeg, endDeg) {
      const midDeg = (startDeg + endDeg) / 2;
      return polarToPoint(sectorCentroidRadius(ring.inner, ring.outer, endDeg - startDeg), midDeg);
    }

    function appendSvgElement(parent, tagName, attrs = {}) {
      const element = document.createElementNS(svgNS, tagName);
      for (const [key, value] of Object.entries(attrs)) {
        element.setAttribute(key, String(value));
      }
      parent.appendChild(element);
      return element;
    }

    function renderBoard(density, showNumbers) {
      const numbers = showNumbers ? shuffle(Array.from({ length: density }, (_, index) => index + 1)) : [];
      const svg = document.createElementNS(svgNS, "svg");
      svg.setAttribute("class", "schulte-svg");
      svg.setAttribute("viewBox", "0 0 466 466");
      svg.setAttribute("role", "group");
      svg.setAttribute("aria-label", `${density} 格圆形舒尔特方格`);

      board.innerHTML = "";
      board.appendChild(svg);
      densityHint.replaceChildren();
      if (!showNumbers) {
        const hintInner = document.createElement("div");
        hintInner.className = "density-hint-inner";
        const levelLabel = document.createElement("span");
        levelLabel.className = "density-level";
        levelLabel.textContent = "LV";
        const valueLabel = document.createElement("span");
        valueLabel.className = "density-value";
        valueLabel.textContent = String(density);
        hintInner.append(levelLabel, valueLabel);
        densityHint.appendChild(hintInner);
      }
      densityHint.classList.toggle("show", !showNumbers);
      cells = [];

      appendSvgElement(svg, "circle", {
        class: "board-backdrop",
        cx: center,
        cy: center,
        r: outerRadius,
      });

      let index = 0;
      for (const [ringIndex, ring] of ringLayouts[density].entries()) {
        const step = 360 / ring.count;
        const phaseOffset = showNumbers ? (ringPhaseOffsets[ringIndex] || 0) : 0;
        for (let i = 0; i < ring.count; i += 1) {
          const value = showNumbers ? numbers[index] : null;
          const startDeg = ring.phase + phaseOffset + step * i;
          const endDeg = startDeg + step;
          const position = numberPosition(ring, startDeg, endDeg);

          const group = appendSvgElement(svg, "g", {
            class: "sector-cell",
            "data-value": value ?? "",
            tabindex: showNumbers ? 0 : -1,
            role: showNumbers ? "button" : "presentation",
            "aria-label": showNumbers ? `数字 ${value}` : "空格",
          });
          const path = appendSvgElement(group, "path", {
            class: "sector-shape",
            d: sectorPath(ring.inner, ring.outer, startDeg, endDeg),
          });
          let text = null;
          if (showNumbers) {
            text = appendSvgElement(group, "text", {
              class: "sector-number",
              x: position.x.toFixed(2),
              y: position.y.toFixed(2),
              fill: gameColors[index] || numberColorBases[index % numberColorBases.length],
              "font-size": numberFontSize(density, ringIndex),
            });
            text.textContent = String(value);
          }

          const cell = { group, path, text, value, done: false };
          group.addEventListener("pointerdown", () => handleCellPress(cell));
          group.addEventListener("keydown", (event) => {
            if (event.key === "Enter" || event.key === " ") {
              event.preventDefault();
              handleCellPress(cell);
            }
          });
          cells.push(cell);
          index += 1;
        }
      }

    }

    function updateControls() {
      appMeta.textContent = `LV ${currentDensity}`;
      if (state === "idle") {
        leftKey.textContent = "左键 开始";
        rightKey.textContent = `右键 ${currentDensity} 格`;
      } else if (state === "running") {
        leftKey.textContent = "左键 清空";
        rightKey.textContent = `右键 ${currentDensity} 格`;
      } else {
        leftKey.textContent = "左键 清空";
        rightKey.textContent = `右键 ${currentDensity} 格`;
      }
    }

    function showIdleBoard() {
      state = "idle";
      target = 1;
      stopTime = 0;
      gameColors = [];
      ringPhaseOffsets = [];
      clearFlash();
      result.classList.remove("show");
      resultTitle.textContent = "";
      renderBoard(currentDensity, false);
      updateControls();
    }

    function switchDensity() {
      if (state !== "idle") {
        return;
      }

      densityIndex = (densityIndex + 1) % densityCycle.length;
      currentDensity = densityCycle[densityIndex];
      renderBoard(currentDensity, false);
      updateControls();
    }

    function startGame() {
      if (state !== "idle") {
        return;
      }

      target = 1;
      stopTime = 0;
      state = "running";
      gameColors = createGameColors(currentDensity);
      ringPhaseOffsets = createRingPhaseOffsets(currentDensity);
      clearFlash();
      renderBoard(currentDensity, true);
      result.classList.remove("show");
      updateControls();
      startTime = nowMs();
    }

    function finishGame() {
      stopTime = nowMs() - startTime;
      state = "result";
      resultTitle.textContent = formatTime(stopTime);
      result.classList.add("show");
      updateControls();
    }

    function clearFlash() {
      if (!activeFlash) {
        return;
      }

      window.clearTimeout(activeFlash.timeoutId);
      activeFlash.cell.group.classList.remove("hit", "miss");
      activeFlash = null;
    }

    function flashCell(cell, className, durationMs = 120) {
      clearFlash();
      cell.group.classList.add(className);
      const timeoutId = window.setTimeout(() => {
        cell.group.classList.remove(className);
        if (activeFlash && activeFlash.cell === cell) {
          activeFlash = null;
        }
      }, durationMs);
      activeFlash = { cell, timeoutId };
    }

    function getAudioContext() {
      const AudioContextClass = window.AudioContext || window.webkitAudioContext;
      if (!AudioContextClass) {
        return null;
      }
      if (!audioContext) {
        audioContext = new AudioContextClass();
      }
      if (audioContext.state === "suspended") {
        audioContext.resume();
      }
      return audioContext;
    }

    function playFeedbackSound(type) {
      const context = getAudioContext();
      if (!context) {
        return;
      }

      const isHit = type === "hit";
      const sampleRate = context.sampleRate;
      const duration = isHit ? 0.03 : 0.048;
      const sampleCount = Math.max(1, Math.floor(sampleRate * duration));
      const buffer = context.createBuffer(1, sampleCount, sampleRate);
      const data = buffer.getChannelData(0);
      let previousNoise = 0;
      let filteredNoise = 0;

      for (let i = 0; i < sampleCount; i += 1) {
        const noise = Math.random() * 2 - 1;
        const highpass = 0.7 * (filteredNoise + noise - previousNoise);
        const lowpass = filteredNoise * 0.82 + noise * 0.18;
        previousNoise = noise;
        filteredNoise = isHit ? highpass : lowpass;

        const t = i / sampleRate;
        const progress = i / Math.max(1, sampleCount - 1);
        const attack = Math.min(1, t / (isHit ? 0.00035 : 0.0012));
        let sample = 0;

        if (isHit) {
          const envelope = attack * Math.exp(-progress * 18);
          sample += Math.sin(2 * Math.PI * 1850 * t) * 0.62 * envelope;
          sample += Math.sin(2 * Math.PI * 3550 * t + 0.7) * 0.24 * envelope;
          sample += filteredNoise * 0.35 * envelope;
          data[i] = clamp(sample * 0.46, -0.85, 0.85);
        } else {
          sample += Math.sin(2 * Math.PI * 170 * t) * 0.82 * attack * Math.exp(-progress * 8);
          sample += Math.sin(2 * Math.PI * 92 * t + 0.4) * 0.4 * attack * Math.exp(-progress * 5.4);
          sample += filteredNoise * 0.22 * attack * Math.exp(-progress * 11);
          data[i] = clamp(sample * 0.56, -0.9, 0.9);
        }
      }

      const source = context.createBufferSource();
      source.buffer = buffer;
      source.connect(context.destination);
      source.start();
    }

    function triggerCellFeedback(type) {
      if (navigator.vibrate) {
        navigator.vibrate(type === "hit" ? 18 : 35);
      }
      playFeedbackSound(type);
    }

    function handleCellPress(cell) {
      if (state !== "running") {
        return;
      }

      if (cell.done || cell.value !== target) {
        triggerCellFeedback("miss");
        flashCell(cell, "miss", 130);
        return;
      }

      cell.done = true;
      triggerCellFeedback("hit");
      flashCell(cell, "hit", 100);
      target += 1;

      if (target > currentDensity) {
        finishGame();
        return;
      }

    }

    function handleLeftKey() {
      if (state === "idle") {
        startGame();
      } else if (state === "running" || state === "result") {
        showIdleBoard();
      }
    }

    function handleRightKey() {
      switchDensity();
    }

    function handleKeydown(event) {
      if (event.repeat) {
        return;
      }
      const key = event.key.toLowerCase();
      if (key === "a" || event.key === "ArrowLeft") {
        event.preventDefault();
        handleLeftKey();
      } else if (key === "d" || event.key === "ArrowRight") {
        event.preventDefault();
        handleRightKey();
      }
    }

    leftKey.addEventListener("click", handleLeftKey);
    rightKey.addEventListener("click", handleRightKey);
    window.addEventListener("keydown", handleKeydown);

    function init() {
      showIdleBoard();
    }

    init();
  </script>
</body>
</html>
